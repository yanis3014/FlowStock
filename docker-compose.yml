services:
  api:
    build:
      context: .
      dockerfile: Dockerfile.api
      target: production
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
      - DATABASE_URL=postgresql://bmad:bmad@postgres:5432/bmad_stock_agent
      - JWT_SECRET=docker-dev-secret-key-at-least-32-characters-long
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - bmad-network
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3000/health', (r) => {process.exit(r.statusCode === 200 ? 0 : 1)})"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        NEXT_PUBLIC_API_URL: http://localhost:3000
    ports:
      - "3002:3002"
    env_file:
      - .env
    environment:
      - NODE_ENV=production
      # Force le port 3002 (évite que PORT=3000 du .env écrase celui du Dockerfile)
      - PORT=3002
    depends_on:
      api:
        condition: service_healthy
    networks:
      - bmad-network
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3002/', (r) => process.exit(r.statusCode === 200 ? 0 : 1))"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  ml-service:
    build:
      context: ./apps/ml-service
      dockerfile: Dockerfile
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    ports:
      - "8000:8000"
    environment:
      - PYTHONUNBUFFERED=1
      - ENV=development
      - DATABASE_URL=postgresql://bmad:bmad@postgres:5432/bmad_stock_agent
      - JWT_SECRET=docker-dev-secret-key-at-least-32-characters-long
      - OPENAI_API_KEY=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

      - STOCKS_SERVICE_URL=http://api:3000
      - INTERNAL_API_TOKEN=
    volumes:
      - ./apps/ml-service:/usr/src/app
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - bmad-network
    healthcheck:
      test: ["CMD", "python", "-c", "import httpx; httpx.get('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  postgres:
    image: postgres:15-alpine
    environment:
      - POSTGRES_USER=bmad
      - POSTGRES_PASSWORD=bmad
      - POSTGRES_DB=bmad_stock_agent
      - POSTGRES_HOST_AUTH_METHOD=md5
    ports:
      # 5433 on host to avoid conflict with local PostgreSQL (migrations from host use 5433)
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./docker/init-pg-hba.sh:/docker-entrypoint-initdb.d/init-pg-hba.sh:ro
    networks:
      - bmad-network
    command: postgres -c listen_addresses='*' -c password_encryption=md5
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bmad -d bmad_stock_agent"]
      interval: 10s
      timeout: 5s
      retries: 5

  prometheus:
    image: prom/prometheus:v2.47.0
    ports:
      - "9090:9090"
    volumes:
      - ./infrastructure/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus-data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.enable-lifecycle'
    networks:
      - bmad-network
    depends_on:
      - api

  grafana:
    image: grafana/grafana:10.2.0
    ports:
      - "3001:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - grafana-data:/var/lib/grafana
    networks:
      - bmad-network
    depends_on:
      - prometheus

networks:
  bmad-network:
    driver: bridge

volumes:
  pgdata:
    driver: local
  prometheus-data:
    driver: local
  grafana-data:
    driver: local

