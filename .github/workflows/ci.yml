name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  lint-and-test:
    name: Lint and Test
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: bmad
          POSTGRES_PASSWORD: bmad
          POSTGRES_DB: bmad_stock_agent
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U bmad -d bmad_stock_agent"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run linter
        run: npm run lint

      - name: Run tests
        env:
          DATABASE_URL: postgresql://bmad:bmad@localhost:5432/bmad_stock_agent
          JWT_SECRET: ci-test-secret-min-32-chars-for-tests-only
          NODE_ENV: test
        run: npm run test

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: lint-and-test
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build packages
        run: npm run build

  docker-build:
    name: Build Docker Images
    runs-on: ubuntu-latest
    needs: build
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build API image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile.api
          push: false
          tags: bmad-stock-agent-api:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build ML Service image
        uses: docker/build-push-action@v5
        with:
          context: ./apps/ml-service
          push: false
          tags: bmad-stock-agent-ml-service:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
