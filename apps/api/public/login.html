<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Connexion - bmad-stock-agent</title>
  <link rel="stylesheet" href="/css/design-system.css">
  <script src="/api-client.js"></script>
</head>
<body class="auth-page">
  <div class="card">
    <h1>Connexion</h1>
    <div id="errorContainer"></div>
    <form id="loginForm">
      <div class="form-group">
        <label for="email">Email</label>
        <input type="email" id="email" name="email" required autocomplete="email" placeholder="vous@exemple.com" />
      </div>
      <div class="form-group">
        <label for="password">Mot de passe</label>
        <input type="password" id="password" name="password" required autocomplete="current-password" placeholder="••••••••" />
      </div>
      <button type="submit" class="btn" id="submitBtn">Se connecter</button>
    </form>
    <div class="link-row">
      <a href="/register-page">Créer un compte</a>
    </div>
  </div>

  <script>
    (function () {
      const form = document.getElementById('loginForm');
      const errorEl = document.getElementById('errorContainer');
      const submitBtn = document.getElementById('submitBtn');

      function showError(msg) {
        errorEl.textContent = msg || '';
      }

      form.addEventListener('submit', async function (e) {
        e.preventDefault();
        showError('');
        submitBtn.disabled = true;

        const email = document.getElementById('email').value.trim();
        const password = document.getElementById('password').value;

        try {
          if (typeof BmadApiClient === 'undefined') {
            showError('API Client non chargé.');
            submitBtn.disabled = false;
            return;
          }
          const res = await BmadApiClient.fetch('/auth/login', {
            method: 'POST',
            body: JSON.stringify({ email: email, password: password })
          });
          const data = await res.json().catch(function () { return {}; });

          if (!res.ok) {
            showError(data.error || 'Connexion impossible.');
            submitBtn.disabled = false;
            return;
          }
          if (data.success && data.data && data.data.access_token) {
            BmadApiClient.saveTokenToStorage(data.data.access_token);
            window.location.href = '/dashboard-page';
            return;
          }
          showError('Réponse inattendue.');
        } catch (err) {
          showError(err.message || 'Erreur réseau.');
        }
        submitBtn.disabled = false;
      });
    })();
  </script>
</body>
</html>
